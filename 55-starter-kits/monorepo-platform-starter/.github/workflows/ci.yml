name: CI

on:
  push:
    paths:
      - "apps/**"
      - "services/**"
      - "packages/**"
      - "scripts/**"
      - "tests/**"
      - "*.md"
  pull_request:
    paths:
      - "apps/**"
      - "services/**"
      - "packages/**"
      - "scripts/**"
      - "tests/**"
      - "*.md"

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python scripts/run_quality_checks.py
